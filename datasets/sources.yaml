# Initial public dataset source registry for Open Domain Platform.
# Verify license and usage terms before commercial use.

sources:
  - id: nasa-power-weather
    name: NASA POWER Weather API
    domain: smart-farming
    provider: NASA POWER Project
    source_url: https://power.larc.nasa.gov/docs/services/api/
    access_type: api
    license_review_status: needs-final-review
    commercial_use_status: likely-usable-with-attribution-review-needed
    useful_for:
      - weather-adapter
      - irrigation-advisory
      - disease-risk-features
      - yield-forecast-features
      - iot-simulation-baseline
    fields_expected:
      - date
      - latitude
      - longitude
      - temperature
      - precipitation
      - humidity
      - solar-radiation
      - wind-speed
    platform_mapping:
      events:
        - WeatherObservationReceived
        - WeatherForecastUpdated
      entities:
        - Plot
        - Farm
        - Crop Plan

